name: Ex2

on:
  push:
    branches: [ testing ]

jobs:
  build:
    runs-on: ubuntu-latest
    # Build Project
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
